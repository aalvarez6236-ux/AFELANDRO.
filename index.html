<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afelandro | Creator Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background: radial-gradient(circle,#7a6dc4,#4b4f9e,#2b2b68);
overflow-x:hidden;
color:white;
}

/* ===== FONDO BOLITAS ===== */

.floating-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.floating-bg span{
position:absolute;
width:18px;
height:18px;
background:linear-gradient(45deg,#ff8c00,#ffb347);
border-radius:50%;
opacity:.6;
filter:blur(1px);
animation:freeBall 20s ease-in-out infinite alternate;
}

@keyframes freeBall{
0%{transform:translate(0,0);}
25%{transform:translate(200px,-150px);}
50%{transform:translate(-180px,120px);}
75%{transform:translate(150px,180px);}
100%{transform:translate(-120px,-100px);}
}

/* ===== SLIDER ===== */

.slider{
display:flex;
width:200vw;
transition:0.6s cubic-bezier(.22,1,.36,1);
}

.page{
width:100vw;
flex-shrink:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px 15px 80px 15px;
box-sizing:border-box;
overflow-y:auto;
}

.content{
width:100%;
max-width:420px;
padding-top:80px;
padding-bottom:60px;
}

/* ===== CONTENEDOR ===== */

.container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
border-radius:25px;
padding:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* ===== FOTO ===== */

.profile-wrapper{
display:flex;
justify-content:center;
margin-top:-50px;
}

.profile-img{
width:130px;
height:130px;
border-radius:50%;
border:4px solid white;
object-fit:contain;
background:#fff;
transition:.3s;
}

.profile-img:hover{
transform:scale(1.08);
box-shadow:0 0 20px #5cc8ff,0 0 40px #9f7bff;
}

/* ===== TEXTOS ===== */

h1{font-size:30px;margin:15px 0 5px;}
.subtitle{font-size:18px;font-weight:bold;margin-bottom:5px;}
.creator-text{font-size:15px;opacity:.9;min-height:24px;margin-bottom:15px;}

/* ===== VIDEO ===== */

.video{
margin:15px 0;
border-radius:14px;
overflow:hidden;
}

iframe{
width:100%;
height:200px;
border:none;
}

/* ===== BOTONES ===== */

.social{
display:flex;
flex-direction:column;
gap:10px;
}

.btn-social{
padding:12px;
border-radius:25px;
text-decoration:none;
color:white;
font-weight:bold;
display:flex;
justify-content:center;
transition:.3s;
}

.instagram{background:linear-gradient(90deg,#ff3cac,#d85eff);}
.instagram:hover{transform:scale(1.05);box-shadow:0 0 15px #ff3cac,0 0 35px #d85eff;}

.facebook{background:linear-gradient(90deg,#2f7fff,#54d2ff);}
.facebook:hover{transform:scale(1.05);box-shadow:0 0 15px #2f7fff,0 0 35px #54d2ff;}

.tiktok{background:linear-gradient(90deg,#000,#333);}
.tiktok:hover{transform:scale(1.05);box-shadow:0 0 15px #fff,0 0 30px #ccc;}

.linkedin{background:linear-gradient(90deg,#0a66c2,#1da1ff);}
.linkedin:hover{transform:scale(1.05);box-shadow:0 0 15px #0a66c2,0 0 35px #1da1ff;}

.youtube{background:linear-gradient(90deg,#ff0000,#ff3b3b);}
.youtube:hover{transform:scale(1.05);box-shadow:0 0 15px #ff0000,0 0 35px #ff3b3b;}

.btn{
margin-top:15px;
padding:12px;
background:#ff3b3b;
color:white;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 18px #ff3b3b,0 0 40px #ff0000;
}

/* ===== PUBLICIDAD ===== */

.ad-title{font-size:26px;}

.ad-logo{
width:100%;
max-width:260px;
height:auto;
margin:20px auto;
display:block;
border-radius:14px;
transition:.3s;
object-fit:contain;
}

.ad-logo:hover{
transform:scale(1.05);
box-shadow:0 0 20px #9f7bff;
}

.ad-logo-secondary:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff3cac,0 0 40px #d85eff;
}

/* ===== FOOTER ===== */

.footer{
text-align:center;
font-size:14px;
margin-top:60px;
padding:25px 15px;
background: radial-gradient(circle,#7a6dc4,#4b4f9e,#2b2b68);
color:white;
opacity:.85;
letter-spacing:.5px;
}

.footer::before{
content:"";
display:block;
width:60px;
height:2px;
background:linear-gradient(90deg,#ff8c00,#ff3b3b);
margin:0 auto 15px auto;
border-radius:2px;
}

.footer strong{letter-spacing:1px;}

.indicators{
position:fixed;
bottom:18px;
width:100%;
display:flex;
justify-content:center;
gap:10px;
}

.dot{
width:9px;height:9px;border-radius:50%;
background:rgba(255,255,255,.4);
transition:.3s;
}

.dot.active{
width:24px;border-radius:20px;background:white;
}

</style>
</head>
